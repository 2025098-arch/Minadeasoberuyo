<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Project</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/lobby.css">
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1>ゲームタイトル</h1>

            <div class="auth-tabs">
                <button id="tab-login" class="active">ログイン</button>
                <button id="tab-register">新規作成</button>
            </div>

            <div class="input-form">
                <input type="text" id="input-nickname" placeholder="ニックネーム" maxlength="15">

                <div class="pin-wrapper">
                    <input type="password" id="input-pin" placeholder="PIN (6桁の数字)" maxlength="6">
                    <button id="btn-toggle-pin">表示</button>
                </div>

                <div id="register-settings" style="display: none;">
                    <h3>初期設定</h3>
                    <label><input type="checkbox" id="setting-ranking-public" checked> 自分を総合順位に公開する</label>
                    <label><input type="checkbox" id="setting-req-history" checked> バトル履歴からのフレンド申請を許可</label>
                    <label><input type="checkbox" id="setting-req-ranking" checked> 総合順位からのフレンド申請を許可</label>
                </div>

                <p id="auth-message" class="message-error"></p>

                <button id="btn-submit" class="btn-primary">ログインする</button>
            </div>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">

        <header class="home-header">
            <div class="profile-section" id="btn-profile" style="cursor: pointer;" title="プロフィールを見る">
                <h2 id="ui-nickname">PlayerName</h2>
                <div class="profile-details">
                    <span>ID: <strong id="ui-id">XXXXXX</strong></span>
                    <span>レベル: <strong id="ui-level">1</strong></span>
                </div>
            </div>

            <div class="status-section">
                <div class="status-item">🪙 <span id="ui-coins">0</span></div>
                <div class="status-item">🏆 <span id="ui-trophies">0</span></div>
                <div class="status-item">🎫 <span id="ui-tickets">0</span></div>
            </div>

            <button id="btn-logout" class="btn-secondary">ログアウト</button>
        </header>

        <div class="home-main-layout">

            <aside class="sidebar-left">
                <button id="btn-mail">✉️ メール</button>
                <button id="btn-history">📜 バトル履歴</button>
                <button id="btn-friends">👥 フレンド</button>
                <button id="btn-ranking">👑 総合順位</button>
                <button id="btn-rewards">🎁 報酬獲得 (ロードマップ)</button>
            </aside>

            <main class="center-area">
                <div id="character-canvas-container">
                    <p class="placeholder-text">ここに自分が操作する立体的なキャラが回転して表示されます</p>
                </div>

                <div class="game-modes">
                    <button id="btn-random-match" class="btn-large btn-play">ランダムマッチ</button>
                    <div class="sub-modes">
                        <button id="btn-private-room" class="btn-medium">プライベートルーム</button>
                        <button id="btn-practice" class="btn-medium">練習モード</button>
                    </div>
                </div>
            </main>

            <aside class="sidebar-right">
                <button id="btn-shop">🛒 ショップ</button>
                <button id="btn-backpack">🎒 バックパック</button>
                <button id="btn-gacha">🎰 ガチャガチャ</button>
                <button id="btn-settings">⚙️ 設定</button>
            </aside>

        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal-window">
            <div class="modal-header">
                <h2 id="modal-title">タイトル</h2>
                <button id="btn-close-modal">✖</button>
            </div>
            <div id="modal-content" class="modal-body">
                </div>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
    <script src="js/lib/three.min.js"></script>

    <script src="js/utils/constants.js"></script>
    <script src="js/core/network.js"></script>
    <script src="js/core/model_renderer.js"></script>
    <script src="js/core/ui.js"></script>

</body>
</html>
